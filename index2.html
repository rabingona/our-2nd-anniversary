<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Happy 2nd Wedding Anniversary ❤️</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", sans-serif;
      }

      body {
        background: linear-gradient(135deg, #ff758c, #ff7eb3);
        min-height: 100vh;
        overflow-x: hidden;
        color: white;
      }

      .hearts {
        position: fixed;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 0;
      }

      .heart {
        position: absolute;
        color: rgba(255, 255, 255, 0.4);
        animation: float 8s linear infinite;
      }

      @keyframes float {
        from {
          transform: translateY(100vh);
          opacity: 0;
        }
        to {
          transform: translateY(-100px);
          opacity: 1;
        }
      }

      .container {
        position: relative;
        z-index: 1;
        text-align: center;
        padding: 40px 20px;
      }

      h1 {
        font-size: 3rem;
        margin-bottom: 10px;
      }

      .subtitle {
        font-size: 1.2rem;
        margin-bottom: 30px;
      }

      .card {
        max-width: 900px;
        margin: auto;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.2);
      }

      #typewriter {
        min-height: 140px;
        line-height: 1.8;
        font-size: 1.1rem;
        text-align: left;
      }

      .timer {
        display: flex;
        justify-content: center;
        gap: 20px;
        margin: 30px 0;
        flex-wrap: wrap;
      }

      .box {
        background: rgba(255, 255, 255, 0.2);
        padding: 15px;
        border-radius: 15px;
        min-width: 100px;
      }

      .box h2 {
        font-size: 2rem;
      }

      button {
        background: white;
        color: #ff4f81;
        border: none;
        padding: 14px 25px;
        border-radius: 30px;
        cursor: pointer;
        font-size: 1rem;
        margin: 10px;
        transition: 0.3s;
      }

      button:hover {
        transform: scale(1.08);
      }

      .reason-box {
        margin-top: 20px;
        font-size: 1.2rem;
        min-height: 50px;
      }

      .gallery {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
        gap: 15px;
        margin-top: 30px;
      }

      .gallery img {
        width: 100%;
        border-radius: 15px;
        height: 250px;
        object-fit: cover;
        transition: 0.4s;
      }

      .gallery img:hover {
        transform: scale(1.05);
      }

      .footer {
        margin-top: 40px;
        font-size: 1.1rem;
      }

      .hidden-message {
        display: none;
        margin-top: 25px;
        font-size: 1.3rem;
        animation: fade 1s;
      }

      @keyframes fade {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }

      @media (max-width: 768px) {
        h1 {
          font-size: 2.2rem;
        }
      }

      .music-player {
        margin: 30px 0;
      }

      .music-player h3 {
        margin-bottom: 10px;
      }

      .music-player audio {
        width: 100%;
        max-width: 400px;
      }

      .lightbox{
    display:none;
    position:fixed;
    z-index:9999;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.9);
}

.lightbox-content{
    display:block;
    margin:auto;
    max-width:90%;
    max-height:80%;
    margin-top:5%;
}

.close{
    position:absolute;
    top:20px;
    right:35px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

    </style>
  </head>
  <body>
    <div class="hearts" id="hearts"></div>

    <div class="container">
      <h1>❤️ Happy 2nd Wedding Anniversary ❤️</h1>
      <p class="subtitle">Two years down, forever to go.</p>

      <div class="card">
        <div id="typewriter"></div>

        <div class="timer">
          <div class="box">
            <h2 id="days">0</h2>
            <p>Days</p>
          </div>

          <div class="box">
            <h2 id="hours">0</h2>
            <p>Hours</p>
          </div>

          <div class="box">
            <h2 id="minutes">0</h2>
            <p>Minutes</p>
          </div>

          <div class="box">
            <h2 id="seconds">0</h2>
            <p>Seconds</p>
          </div>
        </div>

        <button onclick="showReason()">💕 Why I Love You</button>

        <button onclick="showSurprise()">🎁 Click for a Surprise</button>

        <div class="reason-box" id="reasonBox"></div>

        <div class="hidden-message" id="surprise">
          ❤️ No matter how many years pass, I will always choose you. Again.
          Again. And Again. ❤️
        </div>

        <div class="gallery">
          <img src="images/wedding1.jpg" alt="Wedding Day" />

          <img src="images/wedding2.jpg" alt="You are alway My Marilag ❤️" />

          <img src="images/wedding3.jpg" alt="The Promise" />
        </div>
      </div>

      <div class="footer">Made with ❤️ by your husband</div>

      <div class="music-player">
        <h3>🎵 Our Song</h3>
        <audio controls autoplay loop>
          <source
            src="music/David Pomeranz - On This Day (Official Lyric Video).mp3"
            type="audio/mpeg"
          />
          Your browser does not support the audio element.
        </audio>
      </div>
    </div>

    <script>
        
      // Floating hearts
      const heartsContainer = document.getElementById("hearts");

      setInterval(() => {
        const heart = document.createElement("div");
        heart.classList.add("heart");
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = Math.random() * 20 + 15 + "px";
        heartsContainer.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 8000);
      }, 300);

      // Typewriter
      const text = `
My Love,

Today marks two beautiful years since we stood before each other and promised to walk through life hand in hand. Looking back, I realize that these past two years have been some of the most meaningful and beautiful years of my life—not because everything was perfect, but because I got to experience every moment with you.

Thank you for being my safe place, my greatest blessing, my best friend, and the love of my life. Thank you for choosing me every single day, for loving me through my strengths and my flaws, and for making even the simplest moments feel extraordinary.

I want you to know that I treasure every moment we share together—the quiet conversations, the laughter that leaves our cheeks hurting, the challenges we've overcome, and the memories we've created side by side. Every day spent with you becomes a memory I hold close to my heart.

One of my favorite things is us riding together with Maxxie ❤️, feeling the wind on our faces as we chase sunsets, discover new places, and create stories that belong only to us. And as much as I cherish those rides we've already taken, what excites me even more are the countless roads we have yet to explore together. More motorcycle rides, more spontaneous adventures, more late-night talks, more laughter, more dreams fulfilled, and more beautiful memories waiting to be made with you.

You are still my favorite hello and my hardest goodbye. You are the first person I want to share my victories with, the one I run to when life gets difficult, and the person I want beside me through every chapter that is yet to come.

As we celebrate our second wedding anniversary, my heart is filled with gratitude because I get to call you my wife. If I were given the chance to live this life all over again, I would still choose you—every single time, without hesitation.

Here's to more adventures, more love, more dreams, more miles together, and a lifetime of choosing each other.

Happy 2nd Wedding Anniversary, my love. ❤️

Forever yours,
Your Husband
`;

      let i = 0;
      function typeWriter() {
        if (i < text.length) {
          document.getElementById("typewriter").innerHTML += text.charAt(i);
          i++;
          setTimeout(typeWriter, 35);
        }
      }
      typeWriter();

      // Reasons
      const reasons = [
        "You make every ordinary day feel special ❤️",
        "Your smile still melts my heart 😊",
        "You believe in me even when I doubt myself 💕",
        "You are my best friend and soulmate ❤️",
        "You make our house feel like home 🏡",
        "You make life more beautiful every day 🌹",
        "You love me unconditionally ❤️",
        "You are my forever person 💍",
      ];

      function showReason() {
        const random = reasons[Math.floor(Math.random() * reasons.length)];
        document.getElementById("reasonBox").innerHTML = random;
      }

      // Anniversary timer
      const weddingDate = new Date("2024-06-18T00:00:00");

      function updateTimer() {
        const now = new Date();
        const diff = now - weddingDate;

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        document.getElementById("days").textContent = days;
        document.getElementById("hours").textContent = hours;
        document.getElementById("minutes").textContent = minutes;
        document.getElementById("seconds").textContent = seconds;
      }

      setInterval(updateTimer, 1000);
      updateTimer();

      function showSurprise() {
        document.getElementById("surprise").style.display = "block";

        document.body.animate(
          [
            { transform: "scale(1)" },
            { transform: "scale(1.01)" },
            { transform: "scale(1)" },
          ],
          {
            duration: 1000,
          },
        );
      }
    </script>
  </body>
</html>
